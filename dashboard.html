<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskVault - Dashboard</title>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">

        <!-- Header -->
        <header class="dashboard-header">
            <h2>TaskVault</h2>
            <button class="logout-btn">Logout</button>
        </header>

        <!-- Add Task Section -->
        <section class="add-task-section">
            <input type="text" placeholder="Enter new task..." />
            <input type="date" />
            <input type="time" />
            <button>Add Task</button>
        </section>

        <!-- Active Tasks -->
        <section class="tasks-section">
            <h3>Active Tasks</h3>

            <div class="task-item">
                <div class="task-left">
                    <span class="task-title">Complete Web Tech Assignment</span>
                    <span class="deadline green">Due: Mar 10, 5:00 PM</span>
                </div>

                <div class="task-actions">
                    <button class="complete-btn">Complete</button>
                    <button class="delete-btn">Delete</button>
                </div>
            </div>

            <div class="task-item">
                <span>Prepare for AWS Certification</span>
                <div class="task-actions">
                    <button class="complete-btn">Complete</button>
                    <button class="delete-btn">Delete</button>
                </div>
            </div>

        </section>

        <!-- Completed Tasks -->
        <section class="tasks-section completed-section">
            <h3>Completed Tasks</h3>

            <div class="task-item completed">
                <span>Set up Git Repository</span>
                <div class="task-actions">
                    <button class="delete-btn">Delete</button>
                </div>
            </div>

        </section>

    </div>

</body>
</html>
