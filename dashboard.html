<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskVault Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-wrapper">

    <!-- Header -->
    <header class="dashboard-header">
      <h2>TaskVault</h2>
      <div class="header-actions">
        <button id="themeToggle" class="theme-btn">🌙</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </div>
    </header>

    <!-- Task Stats -->
    <section class="task-stats">
      <div class="stat-box">
        <span id="activeCount">0</span>
        <p>Active Tasks</p>
      </div>
      <div class="stat-box">
        <span id="completedCount">0</span>
        <p>Completed</p>
      </div>
    </section>

    <!-- Search & Filter -->
    <section class="search-task-section">
      <div class="search-filter-wrapper">
        <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
        <select id="filterSelect" class="filter-select">
          <option value="all">All Tasks</option>
          <option value="high">High Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="low">Low Priority</option>
        </select>
      </div>
    </section>

    <!-- Add Task -->
    <section class="add-task-section">
      <input id="taskInput" type="text" placeholder="Enter new task...">
      <select id="priorityInput">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <input id="dateInput" type="date">
      <input id="timeInput" type="time">
      <button id="addTaskBtn">Add Task</button>
    </section>

    <!-- Active Tasks List -->
    <section class="tasks-section">
      <h3>Active Tasks</h3>
      <div id="activeTasks"></div>
    </section>

    <!-- Completed Tasks List -->
    <section class="tasks-section">
      <h3>Completed Tasks</h3>
      <div id="completedTasks"></div>
    </section>

  </div>

  <script>
    // ── Theme Toggle ──────────────────────────────────────────────
    const themeBtn = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
      themeBtn.textContent = "☀️";
    }

    themeBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      themeBtn.textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("theme", isDark ? "dark" : "light");
    });

    // ── Logout ────────────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("loggedInUser");
      window.location.href = "index.html";
    });

    // ── Fetch all tasks from backend and render them ───────────────
    const loadTasks = async () => {
      const filterVal = document.getElementById("filterSelect").value;
      const searchVal = document.getElementById("searchInput").value.toLowerCase();

      // GET /api/tasks returns all tasks from MongoDB
      const response = await fetch("/api/tasks");
      const tasks = await response.json();

      // Filter by priority if selected
      let filtered = tasks.filter(task => {
        if (filterVal !== "all" && task.priority !== filterVal) return false;
        if (searchVal && !task.title.toLowerCase().includes(searchVal)) return false;
        return true;
      });

      // Separate active and completed
      const active    = filtered.filter(t => !t.completed);
      const completed = filtered.filter(t => t.completed);

      // Update counters
      document.getElementById("activeCount").textContent    = active.length;
      document.getElementById("completedCount").textContent = completed.length;

      // Render both lists
      renderTasks("activeTasks",    active);
      renderTasks("completedTasks", completed);
    };

    // ── Render a list of tasks into a container div ────────────────
    const renderTasks = (containerId, tasks) => {
      const container = document.getElementById(containerId);
      container.innerHTML = ""; // Clear old content

      if (tasks.length === 0) {
        container.innerHTML = "<p class='no-tasks'>No tasks here.</p>";
        return;
      }

      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task-card";

        div.innerHTML = `
          <div class="task-info">
            <span class="task-title ${task.completed ? "done" : ""}">${task.title}</span>
            <span class="task-meta">
              Priority: <strong>${task.priority}</strong>
              ${task.date ? " | Due: " + task.date : ""}
              ${task.time ? " " + task.time : ""}
            </span>
          </div>
          <div class="task-actions">
            <!-- Toggle complete/incomplete -->
            <button onclick="toggleTask('${task._id}', ${task.completed})">
              ${task.completed ? "↩ Undo" : "✅ Done"}
            </button>
            <!-- Delete task -->
            <button class="delete-btn" onclick="deleteTask('${task._id}')">🗑 Delete</button>
          </div>
        `;

        container.appendChild(div);
      });
    };

    // ── Add a new task ────────────────────────────────────────────
    document.getElementById("addTaskBtn").addEventListener("click", async () => {
      const title    = document.getElementById("taskInput").value.trim();
      const priority = document.getElementById("priorityInput").value;
      const date     = document.getElementById("dateInput").value;
      const time     = document.getElementById("timeInput").value;

      if (!title) {
        alert("Please enter a task title.");
        return;
      }

      // POST /api/tasks — sends task data to backend to save in MongoDB
      await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, priority, date, time })
      });

      // Clear the input fields
      document.getElementById("taskInput").value = "";
      document.getElementById("dateInput").value = "";
      document.getElementById("timeInput").value = "";

      loadTasks(); // Refresh the task list
    });

    // ── Mark a task as complete (or undo) ─────────────────────────
    const toggleTask = async (id, currentStatus) => {
      // PATCH /api/tasks/:id — updates the "completed" field in MongoDB
      await fetch(`/api/tasks/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed: !currentStatus })
      });

      loadTasks(); // Refresh
    };

    // ── Delete a task ─────────────────────────────────────────────
    const deleteTask = async (id) => {
      // DELETE /api/tasks/:id — removes the task from MongoDB
      await fetch(`/api/tasks/${id}`, { method: "DELETE" });
      loadTasks(); // Refresh
    };

    // ── Search & Filter event listeners ───────────────────────────
    document.getElementById("searchInput").addEventListener("input", loadTasks);
    document.getElementById("filterSelect").addEventListener("change", loadTasks);

    // ── Load tasks when page opens ────────────────────────────────
    loadTasks();
  </script>

</body>
</html>
